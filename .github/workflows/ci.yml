name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          NEXTAUTH_SECRET: "ci-test-secret"
          NEXTAUTH_URL: "http://localhost:3000"
          STRIPE_SECRET_KEY: ""
          STRIPE_PUBLISHABLE_KEY: ""
          STRIPE_WEBHOOK_SECRET: ""
          RESEND_API_KEY: ""
          TWILIO_ACCOUNT_SID: ""
          TWILIO_AUTH_TOKEN: ""
          TWILIO_PHONE_NUMBER: ""
          AWS_S3_BUCKET_NAME: ""
          AWS_S3_REGION: ""
          AWS_ACCESS_KEY_ID: ""
          AWS_SECRET_ACCESS_KEY: ""
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ""
          VAPID_PRIVATE_KEY: ""
